syntax = "proto3";

package converter.v1;

option go_package = "github.com/osv/converter/interface/grpc/proto;converterpb";

// ConverterService converts raw CVE records from various sources into OSV format.
service ConverterService {
  // ConvertCVE5 converts a single CVE5 JSON record to OSV format.
  rpc ConvertCVE5(ConvertCVE5Request) returns (ConvertResponse);

  // ConvertNVD converts a single NVD JSON v2.0 record to OSV format.
  rpc ConvertNVD(ConvertNVDRequest) returns (ConvertResponse);

  // BatchConvert converts multiple records from mixed sources.
  rpc BatchConvert(BatchConvertRequest) returns (BatchConvertResponse);

  // GetStats returns conversion statistics for a source.
  rpc GetStats(GetStatsRequest) returns (ConversionStats);

  // TriggerFullConversion triggers a full re-conversion for a named source.
  rpc TriggerFullConversion(TriggerRequest) returns (TriggerResponse);
}

// ---- Request/Response messages ----

message ConvertCVE5Request {
  // Raw CVE5 JSON payload (as bytes to avoid proto schema coupling).
  bytes cve5_json = 1;

  // Source identifier (e.g. "nvd", "github-advisory", "custom").
  string source_id = 2;
}

message ConvertNVDRequest {
  // Raw NVD JSON v2.0 payload.
  bytes nvd_json = 1;

  // Source identifier.
  string source_id = 2;
}

message ConvertResponse {
  // Whether the conversion succeeded.
  bool success = 1;

  // Converted OSV record as JSON bytes.
  bytes osv_json = 2;

  // Original CVE/vulnerability ID.
  string id = 3;

  // Non-fatal notes generated during conversion.
  repeated string notes = 4;

  // Error message if success=false.
  string error = 5;

  // Conversion metadata.
  ConversionMeta meta = 6;
}

message ConversionMeta {
  // Source format ("cve5", "nvd").
  string source_format = 1;

  // Source identifier.
  string source_id = 2;

  // Number of affected packages extracted.
  int32 affected_count = 3;

  // Whether KEV data was present.
  bool has_kev = 4;

  // Whether EPSS score was present.
  bool has_epss = 5;

  // CWE IDs extracted.
  repeated string cwe_ids = 6;
}

message BatchConvertRequest {
  repeated ConvertItem items = 1;
}

message ConvertItem {
  oneof payload {
    ConvertCVE5Request cve5  = 1;
    ConvertNVDRequest  nvd   = 2;
  }
}

message BatchConvertResponse {
  repeated ConvertResponse results = 1;

  // Total items processed.
  int32 total = 2;

  // Number of successful conversions.
  int32 success_count = 3;

  // Number of failed conversions.
  int32 failure_count = 4;
}

message GetStatsRequest {
  // Source identifier to get stats for.
  string source_id = 1;
}

message ConversionStats {
  string source_id = 1;

  // Total records converted.
  int64 total_converted = 2;

  // Total records failed.
  int64 total_failed = 3;

  // Last conversion timestamp (Unix epoch seconds).
  int64 last_converted_at = 4;

  // Average notes per conversion (quality indicator).
  double avg_notes_per_record = 5;
}

message TriggerRequest {
  // Source identifier to re-convert.
  string source_id = 1;

  // Optional: start from this CVE ID (for incremental re-conversion).
  string start_from_id = 2;
}

message TriggerResponse {
  // Whether the trigger was accepted.
  bool accepted = 1;

  // Job ID to track progress.
  string job_id = 2;

  // Estimated records to process.
  int64 estimated_records = 3;

  // Error message if accepted=false.
  string error = 4;
}
