        body: '{"id":0,"source_type":"","source":"cran","name":"aqp","version":"2.3.2","source_id":1,"tran_create":0,"tran_delete":0,"repo_id":2,"repo_type":"R","repository":"RSPM","checksum":"6e04e7d56c99570c27fe5c89d3ef554e2d524885a2f642e4d1276db5dbb126ae","tran_archive":null,"type":"","description":"The Algorithms for Quantitative Pedology (AQP) project was started in 2009 to organize a loosely-related set of concepts and source code on the topic of soil profile visualization, aggregation, and classification into this package (aqp). Over the past 8 years, the project has grown into a suite of related R packages that enhance and simplify the quantitative analysis of soil profile data. Central to the AQP project is a new vocabulary of specialized functions and data structures that can accommodate the inherent complexity of soil profile information; freeing the scientist to focus on ideas rather than boilerplate data processing tasks \u003cdoi:10.1016/j.cageo.2012.10.020\u003e. These functions and data structures have been extensively tested and documented, applied to projects involving hundreds of thousands of soil profiles, and deeply integrated into widely used tools such as SoilWeb \u003chttps://casoilresource.lawr.ucdavis.edu/soilweb-apps\u003e. Components of the AQP project (aqp, soilDB, sharpshootR, soilReports packages) serve an important role in routine data analysis within the USDA-NRCS Soil Science Division. The AQP suite of R packages offer a convenient platform for bridging the gap between pedometric theory and practice.","package_date":null,"date_publication":"2026-04-30T05:10:26Z","authors_r":"c(person(given=\"Dylan\", family=\"Beaudette\", role = c(\"aut\", \"cre\"), email = \"dylan.beaudette@usda.gov\", comment = c(ORCID=\"0009-0008-2780-4785\")),\n            person(given=\"Pierre\", family=\"Roudier\", email=\"roudierp@landcareresearch.co.nz\", role = c(\"aut\", \"ctb\")),\n            person(given=\"Andrew\", family=\"Brown\", email=\"andrew.g.br