syntax = "proto3";

package sbomvex.v1;

option go_package = "github.com/osv/proto/gen/go/sbomvex/v1;sbomvexv1";

// SBOMVEXService handles SBOM and VEX document parsing and generation.
service SBOMVEXService {
  // ParseSBOM parses an SBOM file and returns a list of products.
  rpc ParseSBOM(ParseSBOMRequest) returns (ParseSBOMResponse);

  // GenerateSBOM generates an SBOM document from scan results.
  rpc GenerateSBOM(GenerateSBOMRequest) returns (GenerateSBOMResponse);

  // ParseVEX parses a VEX document and returns triage data.
  rpc ParseVEX(ParseVEXRequest) returns (ParseVEXResponse);

  // GenerateVEX generates a VEX document from CVE scan results.
  rpc GenerateVEX(GenerateVEXRequest) returns (GenerateVEXResponse);

  // DetectSBOMFormat auto-detects the format of an SBOM file.
  rpc DetectSBOMFormat(DetectFormatRequest) returns (DetectFormatResponse);
}

// ─── ParseSBOM ───────────────────────────────────────────────────────────────

message ParseSBOMRequest {
  bytes  file_bytes = 1;
  string file_name  = 2;
  string format     = 3;  // "auto" | "spdx" | "cyclonedx" | "swid"
}

message ParseSBOMResponse {
  repeated ProductInfo products        = 1;
  string               detected_format = 2;
  int32                component_count = 3;
}

// ─── GenerateSBOM ────────────────────────────────────────────────────────────

message GenerateSBOMRequest {
  repeated ScanResult scan_results     = 1;
  string              format           = 2;  // "spdx" | "cyclonedx"
  string              sub_format       = 3;  // "tag-value" | "json" | "yaml"
  string              strip_scan_dir   = 4;
  string              package_name     = 5;
  string              package_version  = 6;
  string              package_supplier = 7;
}

message GenerateSBOMResponse {
  bytes  document     = 1;
  string format       = 2;
  string content_type = 3;
}

// ─── ParseVEX ────────────────────────────────────────────────────────────────

message ParseVEXRequest {
  bytes  file_bytes = 1;
  string file_name  = 2;
  string format     = 3;  // "cyclonedx" | "csaf" | "openvex" | "auto"
}

message ParseVEXResponse {
  map<string, TriageEntry> triage_data     = 1;  // cve_number → triage
  string                   detected_format = 2;
  int32                    statement_count = 3;
}

// ─── GenerateVEX ─────────────────────────────────────────────────────────────

message GenerateVEXRequest {
  repeated ProductCVEs cve_data         = 1;
  string               format           = 2;  // "cyclonedx" | "csaf" | "openvex"
  string               product_name     = 3;
  string               release          = 4;
  string               vendor           = 5;
  string               revision_reason  = 6;
}

message GenerateVEXResponse {
  bytes  document     = 1;
  string format       = 2;
  string content_type = 3;
}

// ─── DetectSBOMFormat ────────────────────────────────────────────────────────

message DetectFormatRequest {
  bytes file_bytes = 1;
}

message DetectFormatResponse {
  string format     = 1;  // "spdx" | "cyclonedx" | "swid" | "unknown"
  float  confidence = 2;  // 0.0-1.0
}

// ─── Shared Types ─────────────────────────────────────────────────────────────

message ProductInfo {
  string vendor  = 1;
  string product = 2;
  string version = 3;
  string purl    = 4;
}

message ScanResult {
  string vendor    = 1;
  string product   = 2;
  string version   = 3;
  string purl      = 4;
  string file_path = 5;
}

message CVEData {
  string          cve_number    = 1;
  string          severity      = 2;
  float           score         = 3;
  bool            is_exploit    = 4;
  string          data_source   = 5;
  string          justification = 6;
  repeated string response      = 7;
}

message ProductCVEs {
  ProductInfo      product = 1;
  repeated CVEData cves    = 2;
}

message TriageEntry {
  string          remarks       = 1;  // NewFound|Confirmed|Mitigated|FalsePositive|NotAffected
  string          justification = 2;
  string          comments      = 3;
  repeated string response      = 4;
}
