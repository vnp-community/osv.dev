syntax = "proto3";
package identity.v1;
option go_package = "github.com/defectdojo/proto/identity/v1;identityv1";

// IdentityService is the authorization authority for all DefectDojo microservices.
// Every service calls CheckPermission before executing sensitive operations.
service IdentityService {
  // CheckPermission evaluates whether a user holds a permission on an optional resource.
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // ValidateToken validates a JWT access token and returns the principal claims.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // GetUser returns user profile information by ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse);

  // ListUsersForProduct returns all users who have any role in a product.
  // Called by the Notification Service to determine who to notify.
  rpc ListUsersForProduct(ListUsersForProductRequest) returns (ListUsersForProductResponse);
}

message CheckPermissionRequest {
  string user_id = 1;
  string permission = 2;          // e.g. "finding:close"
  optional string product_id = 3;
  optional string product_type_id = 4;
}

message CheckPermissionResponse {
  bool allowed = 1;
  string reason = 2;  // "superuser" | "global_role" | "product_type_role" | "product_role" | "denied"
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  repeated string roles = 4;
  bool is_super = 5;
  string global_role = 6;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string user_id = 1;
  string email = 2;
  string username = 3;
  string first_name = 4;
  string last_name = 5;
  bool is_active = 6;
}

message ListUsersForProductRequest {
  string product_id = 1;
}

message ListUsersForProductResponse {
  repeated UserMembership members = 1;
}

message UserMembership {
  string user_id = 1;
  string email = 2;
  string username = 3;
  string role = 4;            // role name for this product
}
