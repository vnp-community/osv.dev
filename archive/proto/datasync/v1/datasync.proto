syntax = "proto3";

package datasync.v1;

option go_package = "github.com/osv/proto/gen/go/datasync/v1;datasyncv1";

// DataSyncService fetches CVE data from multiple external sources
// and pushes it to the CVEDBService.
service DataSyncService {
  // SyncAll fetches from all enabled sources in parallel.
  rpc SyncAll(SyncAllRequest) returns (SyncAllResponse);

  // SyncSource fetches from a single named source.
  rpc SyncSource(SyncSourceRequest) returns (SyncSourceResponse);

  // GetSyncStatus returns the last sync time and per-source status.
  rpc GetSyncStatus(GetSyncStatusRequest) returns (GetSyncStatusResponse);

  // CheckLatestVersion checks if cve-bin-tool has a newer release.
  rpc CheckLatestVersion(CheckVersionRequest) returns (CheckVersionResponse);
}

// ─── SyncAll ─────────────────────────────────────────────────────────────────

message SyncAllRequest {
  repeated string disabled_sources = 1;  // Source names to skip
  bool            force_update     = 2;  // Ignore 24h schedule check
  bool            offline          = 3;  // Skip all network fetching
  string          mirror           = 4;  // Custom NVD mirror URL
  string          nvd_api_key      = 5;  // NVD API key (optional)
  string          nvd_mode         = 6;  // json-mirror|json-nvd|api2
}

message SyncAllResponse {
  repeated string sources_updated = 1;
  repeated string sources_failed  = 2;
  int32           total_cves      = 3;
  string          duration        = 4;  // e.g. "1m23s"
}

// ─── SyncSource ──────────────────────────────────────────────────────────────

message SyncSourceRequest {
  string source      = 1;  // NVD|OSV|GAD|REDHAT|CURL|EPSS|PURL2CPE
  string mirror      = 2;
  string nvd_api_key = 3;
  string nvd_mode    = 4;
}

message SyncSourceResponse {
  string source          = 1;
  bool   success         = 2;
  int32  records_fetched = 3;
  string error           = 4;
}

// ─── GetSyncStatus ───────────────────────────────────────────────────────────

message GetSyncStatusRequest {}

message GetSyncStatusResponse {
  string              last_sync    = 1;  // RFC3339 timestamp
  repeated SourceStatus sources   = 2;
}

message SourceStatus {
  string name      = 1;
  string last_sync = 2;   // RFC3339 or empty
  bool   available = 3;   // Can reach the source
  string error     = 4;   // Last error (empty if ok)
}

// ─── CheckLatestVersion ──────────────────────────────────────────────────────

message CheckVersionRequest {}

message CheckVersionResponse {
  string current_version  = 1;
  string latest_version   = 2;
  bool   update_available = 3;
}
