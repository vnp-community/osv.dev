syntax = "proto3";

package scanner.v1;

option go_package = "github.com/osv/proto/gen/go/scanner/v1;scannerv1";

// ScannerService performs binary file/directory scanning to detect
// software components and versions (NOT network scanning).
service ScannerService {
  // ScanFile scans a binary file or directory for software components.
  rpc ScanFile(ScanFileRequest) returns (ScanFileResponse);

  // ScanSBOM parses an SBOM file to extract product/version list.
  rpc ScanSBOM(ScanSBOMRequest) returns (ScanSBOMResponse);

  // ScanPackageList parses a package list file (requirements.txt, go.mod, etc.).
  rpc ScanPackageList(ScanPackageListRequest) returns (ScanPackageListResponse);

  // MergeReports merges multiple intermediate JSON scan reports.
  rpc MergeReports(MergeReportsRequest) returns (MergeReportsResponse);

  // ListCheckers returns all available binary checkers.
  rpc ListCheckers(ListCheckersRequest) returns (ListCheckersResponse);
}

// ─── ScanFile ────────────────────────────────────────────────────────────────

message ScanFileRequest {
  bytes            file_bytes    = 1;  // Raw binary content
  string           file_name     = 2;  // Filename (used for type detection)
  bool             extract       = 3;  // Auto-extract archives (tar/zip/rpm/deb)
  repeated string  skip_checkers = 4;  // Checker names to skip
  repeated string  run_checkers  = 5;  // Only run these checkers (empty = all)
}

message ScanFileResponse {
  repeated ScanResult results       = 1;
  int32               scanned_files = 2;
}

// ─── ScanSBOM ────────────────────────────────────────────────────────────────

message ScanSBOMRequest {
  bytes  file_bytes = 1;
  string file_name  = 2;
  string format     = 3;  // "auto" | "spdx" | "cyclonedx" | "swid"
}

message ScanSBOMResponse {
  repeated ScanResult products        = 1;
  string              detected_format = 2;
  int32               component_count = 3;
}

// ─── ScanPackageList ─────────────────────────────────────────────────────────

message ScanPackageListRequest {
  bytes  file_bytes = 1;
  string file_name  = 2;  // Used to detect list type (requirements.txt, go.mod...)
}

message ScanPackageListResponse {
  repeated ScanResult products      = 1;
  string              detected_type = 2;  // "pip" | "npm" | "go" | "cargo" | "maven" | ...
}

// ─── MergeReports ────────────────────────────────────────────────────────────

message MergeReportsRequest {
  repeated bytes  reports = 1;  // JSON report bytes to merge
  repeated string tags    = 2;  // Optional tags for filtering
  repeated string filters = 3;  // Optional filters (e.g. severity)
}

message MergeReportsResponse {
  bytes merged_report = 1;  // Merged JSON report
}

// ─── ListCheckers ────────────────────────────────────────────────────────────

message ListCheckersRequest {
  string filter = 1;  // Optional: filter by vendor/product name
}

message ListCheckersResponse {
  repeated CheckerInfo checkers = 1;
  int32                total    = 2;
}

message CheckerInfo {
  string          name     = 1;
  repeated string vendors  = 2;
  repeated string products = 3;
}

// ─── Shared Types ─────────────────────────────────────────────────────────────

// ScanResult represents a detected software component.
message ScanResult {
  string vendor    = 1;
  string product   = 2;
  string version   = 3;
  string purl      = 4;
  string file_path = 5;
}
