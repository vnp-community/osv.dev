syntax = "proto3";

package reporter.v1;

option go_package = "github.com/osv/proto/gen/go/reporter/v1;reporterv1";

// ReporterService generates CVE scan reports in multiple formats.
service ReporterService {
  // GenerateReport generates reports in one or more output formats.
  rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);

  // GenerateAvailableFix checks Linux distro availability of fixes.
  rpc GenerateAvailableFix(AvailableFixRequest) returns (AvailableFixResponse);

  // GetSupportedFormats lists supported output formats.
  rpc GetSupportedFormats(GetFormatsRequest) returns (GetFormatsResponse);
}

// ─── GenerateReport ──────────────────────────────────────────────────────────

message GenerateReportRequest {
  repeated ProductCVEs cve_data       = 1;
  repeated string      formats        = 2;  // ["console","csv","json","json2","html","pdf"]
  string               scan_target    = 3;  // Path/name of what was scanned
  string               min_severity   = 4;  // LOW|MEDIUM|HIGH|CRITICAL
  float                min_score      = 5;  // Minimum CVSS score
  string               theme          = 6;  // "light" | "dark" (for HTML/console)
  string               strip_scan_dir = 7;  // Strip this prefix from file paths
  bool                 quiet          = 8;  // Suppress extra output
}

message GenerateReportResponse {
  map<string, bytes> reports    = 1;  // format → bytes (e.g. "html" → HTML bytes)
  int32              exit_code  = 2;  // 0 = no CVEs found, 1 = CVEs found
  int32              total_cves = 3;
}

// ─── GenerateAvailableFix ────────────────────────────────────────────────────

message AvailableFixRequest {
  repeated ProductCVEs cve_data = 1;
  repeated string      distros  = 2;  // ["ubuntu", "debian", "rhel", "alpine"]
}

message AvailableFixResponse {
  repeated FixResult fixes = 1;
}

message FixResult {
  string cve_number    = 1;
  string product       = 2;
  string distro        = 3;
  string fixed_version = 4;
  string status        = 5;  // "fixed" | "pending" | "wontfix" | "unknown"
}

// ─── GetSupportedFormats ─────────────────────────────────────────────────────

message GetFormatsRequest {}

message GetFormatsResponse {
  repeated FormatInfo formats = 1;
}

message FormatInfo {
  string name         = 1;  // "html"
  string description  = 2;  // "HTML report with severity charts"
  string content_type = 3;  // "text/html"
  string extension    = 4;  // ".html"
}

// ─── Shared Types ─────────────────────────────────────────────────────────────

message ProductInfo {
  string vendor  = 1;
  string product = 2;
  string version = 3;
  string purl    = 4;
}

message CVEData {
  string          cve_number    = 1;
  string          severity      = 2;
  int32           remarks       = 3;
  float           score         = 4;
  int32           cvss_version  = 5;
  string          cvss_vector   = 6;
  string          data_source   = 7;
  bool            is_exploit    = 8;
  string          justification = 9;
  repeated string response      = 10;
  float           epss          = 11;
}

message ProductCVEs {
  ProductInfo      product = 1;
  repeated CVEData cves    = 2;
}
