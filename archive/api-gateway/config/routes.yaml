routes:
  - path: "/v1/vulns/{id}"
    method: GET
    upstream: vulnerability-query-service
    auth_required: false
    rate_limit_tier: public

  - path: "/v1/query"
    method: POST
    upstream: vulnerability-query-service
    auth_required: false
    rate_limit_tier: public

  - path: "/v1/querybatch"
    method: POST
    upstream: vulnerability-query-service
    auth_required: false
    body_size_limit: 1048576  # 1MB

  - path: "/v1experimental/determineversion"
    method: POST
    upstream: version-index-service
    auth_required: false

  - path: "/v1admin/sources"
    method: POST
    upstream: source-sync-service
    auth_required: true
    required_role: admin

  - path: "/internal/*"
    auth_required: true
    internal_only: true
