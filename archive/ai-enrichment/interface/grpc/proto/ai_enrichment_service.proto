syntax = "proto3";

package osv.ai.v1;

option go_package = "github.com/osv/ai-enrichment/interface/grpc/proto;aiproto";

service AIEnrichmentService {
  // Get existing enrichment metadata for a vulnerability.
  rpc GetEnrichment(GetEnrichmentRequest) returns (AIMetadata);

  // Trigger AI enrichment for a vulnerability.
  rpc TriggerEnrichment(TriggerEnrichmentRequest) returns (TriggerEnrichmentResponse);

  // Translate a natural language query into structured search parameters.
  rpc TranslateQuery(TranslateQueryRequest) returns (TranslateQueryResponse);

  // Generate an embedding for the given text.
  rpc GenerateEmbedding(GenerateEmbeddingRequest) returns (GenerateEmbeddingResponse);

  // Find vulnerabilities similar to the given embedding (used by Alias Service).
  rpc FindSimilar(FindSimilarRequest) returns (FindSimilarResponse);
}

message GetEnrichmentRequest {
  string vuln_id = 1;
}

message AIMetadata {
  repeated float description_embedding = 1 [packed = true];
  string embedding_model               = 2;
  string embedding_version             = 3;
  float exploitability_score           = 4;
  string severity_prediction           = 5;
  float prediction_confidence          = 6;
  repeated string attack_vector_tags   = 7;
  repeated string weakness_types       = 8;
  string remediation_advice            = 9;
  string technical_summary             = 10;
  string processed_at                  = 11;
  string model_version                 = 12;
}

message TriggerEnrichmentRequest {
  string vuln_id          = 1;
  repeated string types   = 2;  // EMBEDDING | SEVERITY | TAGS | SUMMARY | ALL
  bool force              = 3;  // Ignore cache, re-enrich
}

message TriggerEnrichmentResponse {
  string job_id   = 1;
  string status   = 2;  // QUEUED | PROCESSING | COMPLETED | FAILED
}

message TranslateQueryRequest {
  string nl_query = 1;
}

message TranslateQueryResponse {
  string ecosystem            = 1;
  string package              = 2;
  string search               = 3;
  repeated string cwe_types   = 4;
  repeated string attack_vectors = 5;
  string explanation          = 6;
}

message GenerateEmbeddingRequest {
  string text = 1;
}

message GenerateEmbeddingResponse {
  repeated float embedding = 1 [packed = true];
  string model             = 2;
  int32 dimension          = 3;
}

message FindSimilarRequest {
  repeated float embedding = 1 [packed = true];
  int32 top_k              = 2;
  float min_score          = 3;
  string exclude_id        = 4;
}

message FindSimilarResponse {
  repeated SimilarVuln results = 1;
}

message SimilarVuln {
  string vuln_id = 1;
  float score    = 2;
}
