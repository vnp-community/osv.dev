# =============================================================
# Nginx reverse proxy — c12.openledger.vn (Frontend) & Backend proxy
# Deploy this config on 172.20.2.16 (Public: 103.67.184.32)
# =============================================================

# ---- HTTP: redirect all to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name c12.openledger.vn;

    # Let certbot renew via ACME http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: serve Frontend & proxy to OSV server ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name c12.openledger.vn;

    # --- TLS (managed by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/c12.openledger.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/c12.openledger.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # --- Proxy timeouts (OSV API can be slow for large scans) ---
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    # --- ALL API routes → OSV Gateway (port 8080) ---
    # Gateway handles auth, routing to search-service/data-service/finding-service etc.
    # IMPORTANT: proxy_pass must NOT include a URI suffix (no trailing /api/).
    # When proxy_pass has a URI (e.g. /api/), nginx strips the location prefix from
    # the request URI before forwarding. We want the FULL path forwarded unchanged.
    location /api/ {
        proxy_pass http://172.20.2.48:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # --- OSV v1 API ---
    location /v1/ {
        proxy_pass http://172.20.2.48:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # NOTE: /cve/* routes are SPA routes served by the React frontend.
    # Backend CVE API calls are routed via /api/v2/cves/ (handled above).
    # Do NOT proxy /cve/ to the backend — let it fall through to location /
    # so the frontend container (3000) handles SPA routing with try_files.

    # --- Info endpoint → Gateway ---
    location /info {
        proxy_pass http://172.20.2.48:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Health check endpoint ---
    location /health {
        proxy_pass http://172.20.2.48:8080;
        access_log off;
    }

    # --- Frontend: Proxy to OSV Frontend Container ---
    location / {
        proxy_pass http://172.20.2.48:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
