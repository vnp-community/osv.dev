# =============================================================
# OSV Platform — Local Development docker-compose
# Build context: repository root
# Usage: docker-compose -f deploy/dev/docker-compose.yml up -d
#
# Infra: PostgreSQL 16 + pgvector, MongoDB 7, Redis 7, NATS JetStream,
#        OpenSearch 2 (search backend)
#
# Service: apps/osv (built from source via Dockerfile)
# Env:     deploy/dev/.env (copy from .env.example)
# =============================================================

services:
  # ============================================================
  # Infrastructure
  # ============================================================

  postgres:
    image: pgvector/pgvector:pg16   # pgvector extension required for cves.embedding
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-osv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osv_dev_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-osvdb}      # consistent with POSTGRES_DSN
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osv} -d ${POSTGRES_DB:-osvdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--name", "osv-nats"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8222/varz | grep -q server_name || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=osv-search
    ports: ["9200:9200"]
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # OSV Unified Gateway (apps/osv) — built from source
  # Spec: 01-architecture.md §2.1 — OSV_MODE=microservices
  # ============================================================
  osv-server:
    build:
      context: ../..
      dockerfile: apps/osv/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"    # Gateway HTTP (apps/osv)
      - "9101:9101"    # identity-service HTTP (JWKS, login, register)
      - "9001:9001"    # identity-service gRPC
    environment:
      # ── Gateway mode ────────────────────────────────────────
      OSV_MODE: "microservices"
      HTTP_PORT: "8080"

      # ── PostgreSQL ───────────────────────────────────────────
      # Spec: 01-architecture.md §4.1 — Schema-per-service (auth, vuln, notif)
      POSTGRES_DSN: "postgres://${POSTGRES_USER:-osv}:${POSTGRES_PASSWORD:-osv_dev_secret}@postgres:5432/${POSTGRES_DB:-osvdb}?sslmode=disable"
      IDENTITY_DATABASE_URL: "postgres://${POSTGRES_USER:-osv}:${POSTGRES_PASSWORD:-osv_dev_secret}@postgres:5432/${POSTGRES_DB:-osvdb}?sslmode=disable"
      DATA_DATABASE_URL:     "postgres://${POSTGRES_USER:-osv}:${POSTGRES_PASSWORD:-osv_dev_secret}@postgres:5432/${POSTGRES_DB:-osvdb}?sslmode=disable"
      NOTIFICATION_DATABASE_URL: "postgres://${POSTGRES_USER:-osv}:${POSTGRES_PASSWORD:-osv_dev_secret}@postgres:5432/${POSTGRES_DB:-osvdb}?sslmode=disable"

      # ── MongoDB ─────────────────────────────────────────────
      MONGO_URI: "mongodb://mongodb:27017"
      MONGO_DB:  "${MONGO_DB:-cvedb}"

      # ── Redis ───────────────────────────────────────────────
      REDIS_ADDR:     "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_URL:      "redis://redis:6379/0"

      # ── NATS ────────────────────────────────────────────────
      NATS_URL:     "nats://nats:4222"
      NATS_ENABLED: "${NATS_ENABLED:-true}"

      # ── Search ──────────────────────────────────────────────
      OPENSEARCH_URL:   "http://opensearch:9200"
      OPENSEARCH_INDEX: "${OPENSEARCH_INDEX:-vulnerabilities}"
      SEARCH_BACKEND:   "${SEARCH_BACKEND:-auto}"

      # ── Identity service ────────────────────────────────────
      # Spec: 01-architecture.md §3.10 — Auth Chain + JWKS
      IDENTITY_HTTP_PORT: "9101"
      IDENTITY_GRPC_PORT: "9001"
      JWT_PRIVATE_KEY_PATH: "/run/secrets/jwt_private.pem"
      JWT_ISSUER:    "${JWT_ISSUER:-https://auth.openvulnscan.io}"
      JWT_AUDIENCE:  "${JWT_AUDIENCE:-openvulnscan}"
      JWKS_URL:      "http://localhost:9101/.well-known/jwks.json"
      JWT_SECRET:    "${JWT_SECRET:-dev-secret-change-in-production-min-32-chars}"

      # ── Service ports (spec §2.2 Port Map) ──────────────────
      DATA_HTTP_PORT:           "8082"
      DATA_GRPC_PORT:           "50053"
      SEARCH_HTTP_PORT:         "8083"
      SEARCH_GRPC_PORT:         "50056"
      RANKING_PORT:             "8088"
      NOTIFICATION_HTTP_PORT:   "8086"
      NOTIFICATION_GRPC_PORT:   "50063"
      AI_GRPC_PORT:             "50052"

      # ── Upstream HTTP addresses (EmbeddedConfig) ─────────────
      # Code: services/gateway-service/embedded.go — WireEmbedded()
      IDENTITY_SERVICE_HTTP: "http://localhost:9101"
      DATA_SERVICE_HTTP:     "http://localhost:8082"
      SEARCH_SERVICE_HTTP:   "http://localhost:8083"
      RANKING_SERVICE_HTTP:  "http://localhost:8088"
      NOTIFICATION_HTTP:     "http://localhost:8086"

      # ── AI ───────────────────────────────────────────────────
      AI_BACKEND:    "${AI_BACKEND:-ollama}"
      AI_MODEL:      "${AI_MODEL:-llama3}"
      AI_BASE_URL:   "${AI_BASE_URL:-http://host.docker.internal:11434}"
      OPENAI_API_KEY:  "${OPENAI_API_KEY:-}"
      VERTEX_PROJECT_ID: "${VERTEX_PROJECT_ID:-}"
      VERTEX_LOCATION:   "${VERTEX_LOCATION:-us-central1}"

      # ── Storage backend ─────────────────────────────────────
      # Code: services/data-service/internal/config/storage_config.go
      ALIAS_GROUP_BACKEND: "${ALIAS_GROUP_BACKEND:-postgres}"

      # ── Admin seed account ───────────────────────────────────
      INIT_ADMIN_EMAIL:    "${INIT_ADMIN_EMAIL:-admin@openvulnscan.io}"
      INIT_ADMIN_USERNAME: "${INIT_ADMIN_USERNAME:-admin}"
      INIT_ADMIN_PASSWORD: "${INIT_ADMIN_PASSWORD:-Admin@123!ChangeMe}"

      # ── Notifications ────────────────────────────────────────
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN:-}"
      SMTP_HOST:       "${SMTP_HOST:-}"
      SMTP_PORT:       "${SMTP_PORT:-587}"
      SMTP_USER:       "${SMTP_USER:-}"
      SMTP_PASSWORD:   "${SMTP_PASSWORD:-}"

      # ── Misc ─────────────────────────────────────────────────
      LOG_LEVEL:       "${LOG_LEVEL:-debug}"
      FORCE_INSECURE:  "${FORCE_INSECURE:-true}"   # dev only — disable JWT secret check
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:5173}"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Ollama on host

  # ============================================================
  # Frontend (pre-built via vite/npm run build)
  # ============================================================
  osv-frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ../../ui/dist:/usr/share/nginx/html:ro
      - ./ui-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - osv-server

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  opensearch_data:
    driver: local
