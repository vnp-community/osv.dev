# =============================================================
# OSV Platform — Local Development docker-compose
# Build context: repository root (/Users/binhnt/Lab/sec/cve/osv.dev)
# Usage: docker-compose -f deploy/dev/docker-compose.yml up -d
# =============================================================

services:
  # ==============================
  # Infrastructure
  # ==============================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: osv
      POSTGRES_PASSWORD: osv_dev
      POSTGRES_DB: osv
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osv"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--name", "osv-nats"]
    ports:
      - "4222:4222"  # client
      - "8222:8222"  # monitoring

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=osv-search
    ports: ["9200:9200"]
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==============================
  # Core Services
  # ==============================
  identity-service:
    build:
      context: ../..
      dockerfile: services/identity-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "50051:50051"
    environment:
      HTTP_PORT: "8081"
      GRPC_PORT: "50051"
      POSTGRES_DSN: "postgres://osv:osv_dev@postgres:5432/osv?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-secret-change-in-production-min-32-chars"
      JWT_EXPIRY: "24h"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  data-service:
    build:
      context: ../..
      dockerfile: services/data-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8082"
      - "50052:50052"
    environment:
      HTTP_PORT: "8082"
      GRPC_PORT: "50052"
      POSTGRES_DSN: "postgres://osv:osv_dev@postgres:5432/osv?sslmode=disable"
      MONGO_URI: "mongodb://mongodb:27017"
      MONGO_DB: "osv"
      NATS_URL: "nats://nats:4222"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      nats:
        condition: service_started

  search-service:
    build:
      context: ../..
      dockerfile: services/search-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8083:8083"
      - "50053:50053"
    environment:
      HTTP_PORT: "8083"
      GRPC_PORT: "50053"
      ES_ADDR: "http://elasticsearch:9200"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
      SEARCH_BACKEND: "elasticsearch"
      LOG_LEVEL: "debug"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  scan-service:
    build:
      context: ../..
      dockerfile: services/scan-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8084:8084"
      - "50054:50054"
    environment:
      HTTP_PORT: "8084"
      GRPC_PORT: "50054"
      POSTGRES_DSN: "postgres://osv:osv_dev@postgres:5432/osv?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  finding-service:
    build:
      context: ../..
      dockerfile: services/finding-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8085:8085"
      - "50055:50055"
    environment:
      HTTP_PORT: "8085"
      GRPC_PORT: "50055"
      POSTGRES_DSN: "postgres://osv:osv_dev@postgres:5432/osv?sslmode=disable"
      MONGO_URI: "mongodb://mongodb:27017"
      NATS_URL: "nats://nats:4222"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      nats:
        condition: service_started

  ai-service:
    build:
      context: ../..
      dockerfile: services/ai-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8086:8086"
      - "50056:50056"
    environment:
      HTTP_PORT: "8086"
      GRPC_PORT: "50056"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
      AI_PROVIDER: "openai"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      VERTEX_PROJECT: "${VERTEX_PROJECT:-}"
      LOG_LEVEL: "debug"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started

  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8087:8087"
      - "50057:50057"
    environment:
      HTTP_PORT: "8087"
      GRPC_PORT: "50057"
      POSTGRES_DSN: "postgres://osv:osv_dev@postgres:5432/osv?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN:-}"
      LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  gateway-service:
    build:
      context: ../..
      dockerfile: services/gateway-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: "8080"
      IDENTITY_SERVICE_ADDR: "identity-service:50051"
      DATA_SERVICE_ADDR: "data-service:50052"
      SEARCH_SERVICE_ADDR: "search-service:50053"
      SCAN_SERVICE_ADDR: "scan-service:50054"
      FINDING_SERVICE_ADDR: "finding-service:50055"
      AI_SERVICE_ADDR: "ai-service:50056"
      NOTIFICATION_SERVICE_ADDR: "notification-service:50057"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-secret-change-in-production-min-32-chars"
      LOG_LEVEL: "debug"
    depends_on:
      - identity-service
      - data-service
      - search-service
      - scan-service
      - finding-service
      - ai-service
      - notification-service

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  es_data:
    driver: local
