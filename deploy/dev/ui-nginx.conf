server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # SPA Routing (Vite/React/NextJS export)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # CRITICAL: index.html must NEVER be cached.
    # After a new deploy, Vite generates new content-hashed chunk filenames.
    # If the browser serves a stale index.html referencing old chunk hashes,
    # the dynamic import will fail with "Failed to fetch dynamically imported module".
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # Cache hashed static assets aggressively (filename changes on each build)
    location ~* \.(ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
