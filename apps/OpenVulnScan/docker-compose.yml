version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ovs-postgres
    environment:
      POSTGRES_USER: openvulnscan
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: openvulnscan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvulnscan -d openvulnscan"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ovs-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── NATS JetStream ─────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: ovs-nats
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    command: >
      -js
      -m 8222
      --store_dir /data
      --max_file_store 10GB
      --max_mem_store 512MB
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── MinIO (Object Storage for reports) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ovs-minio
    ports:
      - "9000:9000"
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OpenVulnScan Monolith ──────────────────────────────────────────────────
  openvulnscan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ovs-app
    ports:
      - "8080:8080"
    environment:
      CONFIG_PATH: /app/configs/config.docker.yaml
    volumes:
      - ./secrets:/app/secrets:ro
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - app  # chỉ start khi dùng --profile app

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
