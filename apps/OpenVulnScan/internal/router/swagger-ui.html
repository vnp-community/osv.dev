<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenVulnScan API — Docs</title>
    <meta name="description" content="OpenVulnScan API Documentation — Vulnerability Scanning & Management Platform">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
        body { margin: 0; padding: 0; background: #1a1a2e; }
        #swagger-ui { max-width: 1400px; margin: 0 auto; }
        .topbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%) !important; }
        .topbar-wrapper .link { display: flex; align-items: center; }
        .topbar-wrapper .link::before {
            content: "🛡 OpenVulnScan";
            color: #e0e0e0;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        .swagger-ui .topbar a.link span { display: none; }
    </style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
<script>
window.onload = function() {
    const ui = SwaggerUIBundle({
        url: "/api/v1/openapi.yaml",
        dom_id: '#swagger-ui',
        presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
        ],
        plugins: [SwaggerUIBundle.plugins.DownloadUrl],
        layout: "StandaloneLayout",
        deepLinking: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        docExpansion: "list",
        filter: true,
        showExtensions: true,
        tryItOutEnabled: true,
        // Auto-attach stored token
        requestInterceptor: (request) => {
            const token = localStorage.getItem('ovs_access_token');
            if (token && !request.headers['Authorization']) {
                request.headers['Authorization'] = 'Bearer ' + token;
            }
            return request;
        },
        // Store token from login response
        responseInterceptor: (response) => {
            if (response.url && response.url.includes('/api/v1/auth/login') && response.status === 200) {
                try {
                    const data = JSON.parse(response.text);
                    if (data.access_token) {
                        localStorage.setItem('ovs_access_token', data.access_token);
                        console.log('✓ Access token stored automatically');
                    }
                } catch(e) {}
            }
            return response;
        },
        onComplete: () => {
            const token = localStorage.getItem('ovs_access_token');
            if (token) {
                ui.preauthorizeApiKey('BearerAuth', token);
                console.log('✓ Existing token loaded from localStorage');
            }
        }
    });
};
</script>
</body>
</html>
