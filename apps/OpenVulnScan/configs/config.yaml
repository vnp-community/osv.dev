# OpenVulnScan — Configuration
# Override by environment variables prefixed with OVS_

server:
  http_addr: ":8080"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

database:
  url: "postgres://openvulnscan:secret@localhost:5432/openvulnscan?sslmode=disable&search_path=public"
  max_connections: 25
  min_connections: 5

redis:
  url: "redis://localhost:6379"
  db: 0

nats:
  url: "nats://localhost:4222"

storage:
  type: minio
  endpoint: "localhost:9000"
  bucket: "openvulnscan"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false

auth:
  jwt_private_key_path: "secrets/jwt_private.pem"
  jwt_issuer: "https://auth.openvulnscan.io"
  jwt_audience:
    - "openvulnscan"
  jwt_access_ttl: 15m
  jwt_refresh_ttl: 168h
  google_client_id: ""
  google_client_secret: ""
  google_redirect_url: "http://localhost:8080/api/v1/auth/oauth/google/callback"
  github_client_id: ""
  github_client_secret: ""
  github_redirect_url: "http://localhost:8080/api/v1/auth/oauth/github/callback"

scan:
  worker_pool_size: 5
  nmap_binary: "/usr/bin/nmap"
  zap_api_url: "http://localhost:8090"
  default_timeout: 300

admin:
  email: "admin@openvulnscan.local"
  password: "Admin123!"

siem:
  enabled: false
  host: ""
  port: 514
  protocol: "udp"

notification:
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    smtp_user: ""
    smtp_password: ""
    from: "openvulnscan@example.com"
  slack:
    enabled: false
    webhook_url: ""
  teams:
    enabled: false
    webhook_url: ""
  webhook:
    enabled: false

log:
  level: "info"
  format: "json"
