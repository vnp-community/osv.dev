server:
  http_addr: ":8080"
  read_timeout: "30s"
  write_timeout: "60s"
  idle_timeout: "120s"

database:
  url: "${OVS_DATABASE_URL}"
  max_connections: 25
  min_connections: 5

redis:
  url: "${OVS_REDIS_URL}"

nats:
  url: "${OVS_NATS_URL}"

mongo:
  uri: "${OVS_MONGO_URI}"
  database: "${OVS_MONGO_DATABASE}"

auth:
  jwt_private_key_path: "${OVS_AUTH_JWT_PRIVATE_KEY_PATH}"
  jwt_issuer: "https://openvulnscan.local"
  jwt_audience: ["openvulnscan"]
  jwt_access_ttl: "15m"
  jwt_refresh_ttl: "168h"

scan:
  worker_pool_size: 5
  nmap_binary: "/usr/bin/nmap"
  default_timeout: 300

admin:
  email: "${OVS_ADMIN_EMAIL}"
  password: "${OVS_ADMIN_PASSWORD}"

siem:
  enabled: false
  host: "${OVS_SIEM_HOST}"
  port: 514
  protocol: "udp"

notification:
  slack:
    enabled: false
    webhook_url: ""
  email:
    enabled: false

log:
  level: "info"
  format: "json"
