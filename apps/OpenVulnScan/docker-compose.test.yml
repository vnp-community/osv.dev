# docker-compose.test.yml — Test infrastructure for integration tests
# Usage: docker-compose -f docker-compose.test.yml up -d
version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: openvulnscan
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: openvulnscan_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvulnscan -d openvulnscan_test"]
      interval: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: -js
    ports:
      - "4222:4222"

  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      retries: 5
