# docker-compose.prod.yml — OpenVulnScan Production Stack
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env up -d
version: "3.9"

services:
  # ── Main Application ──────────────────────────────────────────────────────
  openvulnscan:
    build:
      context: ../..           # osv.dev root (for COPY services/)
      dockerfile: apps/OpenVulnScan/Dockerfile
      args:
        VERSION: "${VERSION:-latest}"
        BUILD_TIME: "${BUILD_TIME:-}"
    image: "openvulnscan:${VERSION:-latest}"
    container_name: openvulnscan
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      OVS_DATABASE_URL: "postgres://openvulnscan:${DB_PASSWORD}@postgres:5432/openvulnscan"
      OVS_REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      OVS_NATS_URL: "nats://nats:4222"
      OVS_MONGO_URI: "mongodb://mongodb:27017"
      OVS_MONGO_DATABASE: "cvedb"
      OVS_AUTH_JWT_PRIVATE_KEY_PATH: "/app/secrets/jwt_private.pem"
      OVS_ADMIN_EMAIL: "${ADMIN_EMAIL}"
      OVS_ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      OVS_SIEM_HOST: "${SIEM_HOST:-}"
      OVS_SIEM_PORT: "${SIEM_PORT:-514}"
      OVS_SIEM_PROTOCOL: "${SIEM_PROTOCOL:-udp}"
      OVS_SIEM_ENABLED: "${SIEM_ENABLED:-false}"
      OVS_NOTIFICATION_SLACK_ENABLED: "${SLACK_ENABLED:-false}"
      OVS_NOTIFICATION_SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
    volumes:
      - ./configs/config.docker.yaml:/app/configs/config.docker.yaml:ro
      - jwt_secrets:/app/secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    # nmap requires NET_RAW for ICMP and some scan types
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - openvulnscan
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: openvulnscan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openvulnscan
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: openvulnscan
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - openvulnscan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvulnscan -d openvulnscan"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: openvulnscan-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - openvulnscan
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── NATS JetStream ────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: openvulnscan-nats
    restart: unless-stopped
    command: >
      -js
      -m 8222
      --store_dir /data
    volumes:
      - nats_data:/data
    networks:
      - openvulnscan
    ports:
      - "8222:8222"   # NATS monitoring (internal only in prod)

  # ── MongoDB (for CVE/vulnerability data) ──────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: openvulnscan-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - openvulnscan
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Object Storage (for reports) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: openvulnscan-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MINIO_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_PASSWORD}"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - openvulnscan
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  mongo_data:
    driver: local
  minio_data:
    driver: local
  jwt_secrets:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  openvulnscan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
