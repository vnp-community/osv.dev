      summary: KPI stats cho Scan Dashboard
      tags: [Scans]
      security:
        - bearerAuth: []
      description: |
        Trả về summary metrics dùng cho Scan Dashboard KPI cards.
        Frontend tự động refresh mỗi 30 giây.
      responses:
        '200':
          description: Scan stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanStats'

  /scans/stats/weekly:
    get:
      operationId: scans_get_weekly_activity
      summary: Weekly activity chart data
      tags: [Scans]
      security:
        - bearerAuth: []
      description: |
        Trả về 7 điểm dữ liệu (Mon–Sun) cho weekly activity bar chart.
        Data ổn định — KHÔNG random. Cache 5 phút phía backend.
      responses:
        '200':
          description: Weekly activity data (7 items)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeeklyActivity'
                minItems: 7
                maxItems: 7

  # ─── Webhook Deliveries (/api/v1/webhooks/deliveries) ──────────────────────
  /webhooks/deliveries:
    get:
      operationId: webhook_deliveries_list
      summary: Lịch sử webhook deliveries
      tags: [Integrations]
      security:
        - bearerAuth: []
      parameters:
        - name: webhook_id
          in: query
          description: Filter theo webhook (optional — nếu bỏ qua thì trả all)
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [success, failed, retried]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Delivery records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveriesResponse'

  /webhooks/deliveries/{deliveryId}/retry:
    post:
      operationId: webhook_retry_delivery
      summary: Retry một webhook delivery thất bại
      tags: [Integrations]
      security:
        - bearerAuth: []
      parameters:
        - name: deliveryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retry đã được kích hoạt — trả về delivery record mới
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDelivery'
        '404':
          description: Delivery không tìm thấy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '422':
          description: Không thể retry delivery có status=success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'

  /webhooks/stats/hourly:
    get:
      operationId: webhook_hourly_stats
      summary: Thống kê webhook deliveries theo giờ (24h)
      tags: [Integrations]
      security:
        - bearerAuth: []
      description: Trả về hourly buckets trong 24h gần nhất — dùng cho activity area chart.
      responses:
        '200':
          description: Hourly delivery stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookHourlyStats'

  # ─── Report Templates (/api/v1/reports/templates) ──────────────────────────
  /reports/templates:
    get:
      operationId: reports_get_templates
      summary: Danh sách report templates
      tags: [Reports]
      security:
        - bearerAuth: []
      description: |
        Trả về các templates có thể dùng để tạo báo cáo.
        Frontend dùng để hiển thị template picker trong Generate Report dialog.
        Cache 10 phút — templates ít thay đổi.
      responses:
        '200':
          description: Report templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplatesResponse'

  # ─── AI Triage Queue — updated response schema ──────────────────────────────
  # NOTE: /ai/triage/queue đã tồn tại ở trên với TriageQueueItem schema cũ.
  # Endpoint không đổi, chỉ cập nhật response schema trong implementation.
  # Backend cần trả về AITriageQueueResponse (bao gồm ai_result + human_decision).

# =============================================================================
# PUBLIC ENDPOINTS (api/v2/public) — No authentication required
# =============================================================================
  /public/stats:
    get:
      operationId: public_get_platform_stats
      summary: Platform statistics (public, không cần auth)
      tags: [Public]
      description: |
        Endpoint công khai — không cần JWT Bearer token.
        Dùng trên Login page để hiển thị stats: tổng CVEs, scans hôm nay,
        finding accuracy, uptime SLA, và threat indicators.

        **Lưu ý:** Backend nên cache response này (TTL 5 phút) để giảm tải.
        Frontend fallback về placeholder "—" nếu endpoint trả 503.
      responses:
        '200':
          description: Platform-wide statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicStats'
        '503':
          description: Service không sẵn sàng (frontend gracefully falls back to placeholder)

