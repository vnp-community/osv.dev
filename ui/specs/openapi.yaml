        '200':
          description: Asset đã cập nhật
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'

  /assets/{id}/findings:
    get:
      operationId: assets_get_findings
      summary: Danh sách findings của asset
      tags: [Assets]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/FindingStatus'
        - name: severity
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Findings của asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingsListResponse'

  # ─── Products (/api/v1/products) ──────────────────────────────────────────
  /products:
    get:
      operationId: products_list
      summary: Danh sách products
      tags: [Product Security]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: page_size
          in: query
