syntax = "proto3";

package cve.v1;

option go_package = "github.com/osv/proto/gen/go/cve/v1;cvev1";

// CVEService provides CVE enrichment and querying capabilities.
// Heavily reuses osv.dev OSV and EPSS clients internally.
service CVEService {
  // EnrichCVEs fetches full CVE data for a list of CVE IDs.
  // Cache-first (24h): DB → OSV API → NVD fallback → EPSS score.
  rpc EnrichCVEs(EnrichCVEsRequest) returns (EnrichCVEsResponse);

  // QueryPackageCVEs finds CVEs affecting specific package versions.
  // Uses pkg/clients/osvdev.QueryByPackage internally.
  rpc QueryPackageCVEs(QueryPackageCVEsRequest) returns (QueryPackageCVEsResponse);

  // GetCVE retrieves detailed CVE information by ID.
  rpc GetCVE(GetCVERequest) returns (GetCVEResponse);
}

// ─── EnrichCVEs ──────────────────────────────────────────────────────────────

message EnrichCVEsRequest {
  repeated string cve_ids  = 1;
  string          scan_id  = 2;  // UUID - for event publishing
  string          asset_id = 3;  // UUID - for CVEEnriched event AssetIDs
}

message EnrichCVEsResponse {
  repeated EnrichedCVE cves       = 1;
  repeated string      failed_ids = 2;  // CVE IDs that could not be enriched
}

message EnrichedCVE {
  string cve_id      = 1;
  string summary     = 2;
  string severity    = 3;    // critical|high|medium|low|none
  float  cvss_v3     = 4;
  string cvss_vector = 5;
  float  epss        = 6;
  string remediation = 7;
}

// ─── QueryPackageCVEs ────────────────────────────────────────────────────────

message QueryPackageCVEsRequest {
  repeated PackageQuery packages = 1;
}

message PackageQuery {
  string ecosystem = 1;  // debian|rpm|pypi|npm|go|homebrew
  string name      = 2;
  string version   = 3;
}

message QueryPackageCVEsResponse {
  // key = "{ecosystem}:{name}:{version}"
  map<string, CVEList> results = 1;
}

message CVEList {
  repeated EnrichedCVE cves = 1;
}

// ─── GetCVE ──────────────────────────────────────────────────────────────────

message GetCVERequest {
  string cve_id = 1;
}

message GetCVEResponse {
  string cve_id       = 1;
  string summary      = 2;
  string description  = 3;
  string severity     = 4;
  float  cvss_v3      = 5;
  string cvss_vector  = 6;
  float  cvss_v2      = 7;
  float  epss         = 8;
  float  epss_percentile = 9;
  string remediation  = 10;
  repeated string references = 11;
  repeated AffectedPackage affected = 12;
  repeated string sources    = 13;  // ["osv","nvd","ghsa"]
}

message AffectedPackage {
  string ecosystem      = 1;
  string package_name   = 2;
  repeated string versions     = 3;
  string fixed_version  = 4;
}
