server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

rate_limit:
  max_rpm: 60
  window: 60s

cors:
  allowed_origins:
    - "https://globalcve.xyz"
    - "http://localhost:3000"
    - "http://localhost:5173"

upstream:
  cve_search:
    url: "${CVE_SEARCH_SERVICE_URL}"
    timeout: 10s
  kev_service:
    url: "${KEV_SERVICE_URL}"
    timeout: 5s
  notification:
    url: "${NOTIFICATION_SERVICE_URL}"
    timeout: 5s
  cve_sync:
    url: "${CVE_SYNC_SERVICE_URL}"
    timeout: 5s

cache:
  redis_url: "${REDIS_URL}"
  token_ttl: 60s

auth:
  jwt_secret: "${JWT_SECRET}"

observability:
  log_level: "info"
  metrics_port: 9090
