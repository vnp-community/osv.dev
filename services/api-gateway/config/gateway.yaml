# CVE Binary Tool API Gateway Configuration
# Path: api-gateway/config/gateway.yaml

server:
  port: 8080
  grpc_port: 9090
  timeout_scan: 300s
  timeout_default: 30s
  max_body_size: 100MB   # for binary uploads

services:
  scanner:
    address: "${SCANNER_ADDR:-scanner:50051}"
    tls: false
    timeout: 300s
  cvedb:
    address: "${CVEDB_ADDR:-cve-service:50052}"
    tls: false
    timeout: 30s
  datasync:
    address: "${DATASYNC_ADDR:-cve-sync-service:50053}"
    tls: false
    timeout: 600s
  reporter:
    address: "${REPORTER_ADDR:-report-service:50054}"
    tls: false
    timeout: 60s
  sbomvex:
    address: "${SBOMVEX_ADDR:-sbomvex:50055}"
    tls: false
    timeout: 30s

rate_limit:
  requests_per_second: 10
  burst: 50

auth:
  api_key_header: "X-API-Key"
  keys: []         # empty = no API key auth required
  jwt_secret: "${JWT_SECRET:-}"

cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "*"

# Legacy upstream URLs (for v2 GlobalCVE proxy)
upstreams:
  cve-service: "${CVE_SERVICE_URL:-http://cve-service:9104}"
  kev-service: "${KEV_SERVICE_URL:-http://kev-service:9108}"
  auth-service: "${AUTH_SERVICE_URL:-http://auth-service:9101}"
