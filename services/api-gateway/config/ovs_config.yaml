# OpenVulnScan API Gateway Configuration
# Port: HTTP :8080, gRPC :50051

server:
  http_port: "8080"
  grpc_port: "50051"
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

# Auth service gRPC connection
auth:
  grpc_address: "auth-service:9001"
  cache_ttl: 60s      # Redis cache TTL for validated JWT tokens
  skip_paths:         # These paths bypass auth entirely
    - "/health/live"
    - "/health/ready"
    - "/metrics"
    - "/.well-known/jwks.json"
    - "/api/v1/auth"  # handled by auth-service (login, register, etc.)

# Upstream services
# Each upstream name must match RouteConfig.Upstream in ovs_routes.go
upstreams:
  auth-service:
    address: "http://auth-service:9101"
    timeout: 10s
  scan-service:
    address: "http://scan-service:9102"
    timeout: 30s       # scans can take longer
  asset-service:
    address: "http://asset-service:9103"
    timeout: 10s
  cve-service:
    address: "http://cve-service:9104"
    timeout: 15s
  agent-service:
    address: "http://agent-service:9105"
    timeout: 10s
  schedule-service:
    address: "http://schedule-service:9106"
    timeout: 10s
  report-service:
    address: "http://report-service:9107"
    timeout: 60s       # PDF generation can take time
  notification-service:
    address: "http://notification:8080"
    timeout: 10s

# Redis
redis:
  url: "redis://redis:6379"
  db: 0

# Rate limiting
rate_limit:
  enabled: true
  default_tier: "standard"  # 60 req/min
  tiers:
    anonymous: {requests: 10, window: 60s}
    standard:  {requests: 60, window: 60s}
    unlimited: {requests: 10000, window: 60s}

# Circuit breaker settings
circuit_breaker:
  threshold: 5          # consecutive failures before opening
  reset_timeout: 30s    # how long to stay open

# CORS
cors:
  allowed_origins: ["*"]
  allowed_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
  allowed_headers: ["Authorization", "Content-Type", "X-Request-ID"]
  max_age: 3600
