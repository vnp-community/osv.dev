# unified-gateway/config/routes.yaml — External routing configuration
# Modify without recompiling the binary.

osv_routes:
  - prefix: /v1/vulns
    upstream: vulnerability-service:50051
    protocol: grpc
  - prefix: /v1/search
    upstream: search-service:50056
    protocol: grpc
  - prefix: /api/v1/scan
    upstream: scan-service:50058
    protocol: grpc
  - prefix: /api/v1/cve
    upstream: search-service:8082
    protocol: http

dd_routes:
  - prefix: /api/v2/findings
    upstream: finding-service:50060
    protocol: grpc
  - prefix: /api/v2/products
    upstream: product-service:50061
    protocol: grpc
  - prefix: /api/v2/reports
    upstream: report-service:50065
    protocol: grpc

health:
  - path: /health
  - path: /info
  - path: /ready
