syntax = "proto3";

package scan.v1;

option go_package = "github.com/osv/proto/gen/go/scan/v1;scanv1";

import "google/protobuf/timestamp.proto";

// ScanService provides read access to scan results.
// Called by report-service and api-gateway to query scan data.
service ScanService {
  // GetScanStatus returns current status and progress of a scan.
  rpc GetScanStatus(GetScanStatusRequest) returns (GetScanStatusResponse);

  // GetFindingsByScan returns all findings for a completed scan.
  rpc GetFindingsByScan(GetFindingsByScanRequest) returns (GetFindingsByScanResponse);
}

// ─── GetScanStatus ───────────────────────────────────────────────────────────

message GetScanStatusRequest {
  string scan_id = 1;  // UUID string
}

message GetScanStatusResponse {
  string scan_id  = 1;
  string status   = 2;  // pending|queued|running|completed|failed|cancelled
  int32  progress = 3;  // 0-100
  string scan_type = 4; // full|discovery|web|agent
  repeated string targets = 5;

  google.protobuf.Timestamp started_at   = 6;
  google.protobuf.Timestamp completed_at = 7;
  google.protobuf.Timestamp failed_at    = 8;
  string error_msg = 9;
}

// ─── GetFindingsByScan ───────────────────────────────────────────────────────

message GetFindingsByScanRequest {
  string scan_id  = 1;
  int32  page     = 2;  // 1-based
  int32  page_size = 3; // default 100
}

message GetFindingsByScanResponse {
  repeated Finding findings = 1;
  int64 total    = 2;
  int32 page     = 3;
  int32 page_size = 4;
}

message Finding {
  string finding_id  = 1;
  string scan_id     = 2;
  string ip_address  = 3;
  string hostname    = 4;
  string os          = 5;
  repeated Port     ports    = 6;
  repeated Service  services = 7;
  repeated string   cve_ids  = 8;
  string severity    = 9;  // highest severity from CVEs
}

message Port {
  int32  port     = 1;
  string protocol = 2;  // tcp|udp
  string state    = 3;  // open|closed|filtered
}

message Service {
  int32  port    = 1;
  string name    = 2;
  string product = 3;
  string version = 4;
}
