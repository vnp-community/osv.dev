syntax = "proto3";

package osv.notification.v1;

option go_package = "github.com/osv/shared/proto/gen/go/notification/v1;notificationv1";

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc GetAlerts(GetAlertsRequest) returns (GetAlertsResponse);
  rpc AcknowledgeAlert(AcknowledgeAlertRequest) returns (AcknowledgeAlertResponse);
}

message SendNotificationRequest {
  string event_type = 1;
  string entity_id = 2;
  string entity_type = 3;
  string summary = 4;
  map<string, string> metadata = 5;
  string severity = 6;
}

message SendNotificationResponse { bool accepted = 1; string notification_id = 2; }

message GetAlertsRequest {
  string entity_id = 1;
  int32 limit = 2;
  string cursor = 3;
}

message GetAlertsResponse {
  repeated Alert alerts = 1;
  string next_cursor = 2;
}

message Alert {
  string id = 1;
  string event_type = 2;
  string summary = 3;
  string status = 4;
  string severity = 5;
  string created_at = 6;
}

message AcknowledgeAlertRequest { string alert_id = 1; }
message AcknowledgeAlertResponse { bool success = 1; }
