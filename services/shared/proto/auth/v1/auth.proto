syntax = "proto3";

package auth.v1;

option go_package = "github.com/osv/proto/gen/go/auth/v1;authv1";

import "google/protobuf/timestamp.proto";

// AuthService provides authentication and authorization primitives
// called by api-gateway on every request.
service AuthService {
  // ValidateToken verifies a JWT Bearer token and returns its claims.
  // This is a fast path: RSA verify + Redis blacklist check, no DB access.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // ValidateAPIKey verifies an API key (ovs_ prefix) and returns permissions.
  rpc ValidateAPIKey(ValidateAPIKeyRequest) returns (ValidateAPIKeyResponse);
}

// ─── ValidateToken ──────────────────────────────────────────────────────────

message ValidateTokenRequest {
  // JWT Bearer token (with or without "Bearer " prefix)
  string token = 1;
}

message ValidateTokenResponse {
  bool   valid       = 1;
  string user_id     = 2;  // UUID string
  string role        = 3;  // "admin" | "user" | "readonly"
  repeated string permissions = 4;
  string error       = 5;  // populated when valid=false
  google.protobuf.Timestamp expires_at = 6;
}

// ─── ValidateAPIKey ─────────────────────────────────────────────────────────

message ValidateAPIKeyRequest {
  // Full API key including "ovs_" prefix
  string api_key = 1;
}

message ValidateAPIKeyResponse {
  bool   valid       = 1;
  string user_id     = 2;  // UUID string of key owner
  string key_id      = 3;  // UUID string of the API key record
  repeated string permissions = 4;
  string error       = 5;  // populated when valid=false
}
