# Route configuration for gateway-service
# Maps URL prefixes to upstream gRPC services

routes:
  # Auth (public)
  - prefix: "/api/v1/auth/register"
    upstream: "identity-service:50051"
    auth_required: false

  - prefix: "/api/v1/auth/login"
    upstream: "identity-service:50051"
    auth_required: false

  - prefix: "/api/v1/auth/oauth"
    upstream: "identity-service:50051"
    auth_required: false

  # Auth (protected)
  - prefix: "/api/v1/auth"
    upstream: "identity-service:50051"
    auth_required: true

  # CVE Data
  - prefix: "/api/v1/cve"
    upstream: "data-service:50052"
    auth_required: true
    roles: ["viewer", "analyst", "admin"]

  # Search
  - prefix: "/api/v1/search"
    upstream: "search-service:50053"
    auth_required: true
    roles: ["viewer", "analyst", "admin"]

  # Scanning
  - prefix: "/api/v1/scan"
    upstream: "scan-service:50054"
    auth_required: true
    roles: ["analyst", "admin"]

  - prefix: "/api/v1/assets"
    upstream: "scan-service:50054"
    auth_required: true
    roles: ["analyst", "admin"]

  - prefix: "/api/v1/schedules"
    upstream: "scan-service:50054"
    auth_required: true
    roles: ["analyst", "admin"]

  # Findings & Products
  - prefix: "/api/v1/findings"
    upstream: "finding-service:50055"
    auth_required: true
    roles: ["analyst", "admin"]

  - prefix: "/api/v1/products"
    upstream: "finding-service:50055"
    auth_required: true
    roles: ["analyst", "admin"]

  - prefix: "/api/v1/reports"
    upstream: "finding-service:50055"
    auth_required: true
    roles: ["analyst", "admin"]

  - prefix: "/api/v1/sla"
    upstream: "finding-service:50055"
    auth_required: true
    roles: ["analyst", "admin"]

  # AI
  - prefix: "/api/v1/ai"
    upstream: "ai-service:50056"
    auth_required: true
    roles: ["analyst", "admin"]

  # Notifications
  - prefix: "/api/v1/notifications"
    upstream: "notification-service:50057"
    auth_required: true

  - prefix: "/api/v1/rules"
    upstream: "notification-service:50057"
    auth_required: true

  - prefix: "/api/v1/webhooks"
    upstream: "notification-service:50057"
    auth_required: true

  - prefix: "/api/v1/integrations"
    upstream: "notification-service:50057"
    auth_required: true

  # Health (public)
  - prefix: "/health"
    upstream: "gateway-health"
    auth_required: false
