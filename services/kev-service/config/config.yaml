server:
  port: 8083
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s

cisa:
  kev_url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
  timeout: 30s

scheduler:
  enabled: true
  run_on_startup: false   # sync immediately on startup?

database:
  url: "${DATABASE_URL}"
  max_conns: 10
  min_conns: 2

observability:
  log_level: "info"
  metrics_port: 9093
