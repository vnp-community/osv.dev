---
# Network Policy: osv-query namespace
# Only osv-gateway can reach gRPC port; only osv-observability can scrape metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: osv-query
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: osv-gateway
      ports:
        - protocol: TCP
          port: 50051
    - from:
        - namespaceSelector:
            matchLabels:
              name: osv-observability
      ports:
        - protocol: TCP
          port: 9090
